<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenVassal — Settings</title>
    <style>
        :root {
            --bg: #0f0f15;
            --bg-secondary: #1a1a2e;
            --surface: #1e1e32;
            --border: #2d2d4a;
            --text: #e8e8f0;
            --text-dim: #8888aa;
            --accent: #00d4ff;
            --green: #00e676;
            --magenta: #e040fb;
            --red: #ff5252;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent), var(--magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .nav-links {
            margin-left: auto;
            display: flex;
            gap: 12px;
        }

        .header .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .header .nav-links a:hover,
        .header .nav-links a.active {
            background: var(--surface);
            color: var(--text);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px;
        }

        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin-bottom: 20px;
        }

        .section h2 {
            font-size: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            background: var(--bg-secondary);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #0088cc);
            color: white;
        }

        .btn-danger {
            background: var(--red);
            color: white;
        }

        .btn-success {
            background: var(--green);
            color: var(--bg);
        }

        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
        }

        .alert.success {
            display: block;
            background: rgba(0, 230, 118, 0.15);
            border: 1px solid var(--green);
            color: var(--green);
        }

        .alert.error {
            display: block;
            background: rgba(255, 82, 82, 0.15);
            border: 1px solid var(--red);
            color: var(--red);
        }

        .agent-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 10px;
        }

        .agent-card .agent-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .agent-card .agent-name {
            font-weight: 600;
            font-size: 14px;
        }

        .agent-card .agent-model {
            font-size: 12px;
            color: var(--text-dim);
            margin-left: auto;
        }

        .agent-card .agent-role {
            font-size: 13px;
            color: var(--text-dim);
        }

        .toggle {
            width: 36px;
            height: 20px;
            background: var(--border);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle.active {
            background: var(--green);
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle.active::after {
            transform: translateX(16px);
        }

        .memory-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .memory-item {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .memory-item:last-child {
            border-bottom: none;
        }

        .memory-item .delete-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            font-size: 16px;
            opacity: 0.5;
        }

        .memory-item .delete-btn:hover {
            opacity: 1;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="header">
        <h1>⚡ OpenVassal Settings</h1>
        <div class="nav-links">
            <a href="/" class="active">Settings</a>
            <a href="/chat">Chat</a>
        </div>
    </div>

    <div class="container">
        <div id="statusAlert" class="alert"></div>

        <!-- API Keys -->
        <div class="section">
            <h2>🔑 API Keys</h2>
            <div class="form-group">
                <label>OpenAI API Key (required for mem0 + coder)</label>
                <input type="password" id="openaiKey" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label>Anthropic API Key (for claude_planner)</label>
                <input type="password" id="anthropicKey" placeholder="sk-ant-...">
            </div>
            <div class="form-group">
                <label>Google Gemini API Key (for gemini_chat)</label>
                <input type="password" id="geminiKey" placeholder="...">
            </div>
            <div class="form-group">
                <label>Moonshot API Key (for kimi_writer)</label>
                <input type="password" id="moonshotKey" placeholder="sk-...">
            </div>
        </div>

        <!-- General Settings -->
        <div class="section">
            <h2>⚙️ General</h2>
            <div class="form-group">
                <label>Default Agent</label>
                <input type="text" id="defaultAgent" placeholder="e.g. gemini_chat">
            </div>
            <div class="form-group">
                <label>mem0 User ID</label>
                <input type="text" id="mem0UserId" placeholder="default_user">
            </div>
            <div class="form-group">
                <label>Log Level</label>
                <select id="logLevel">
                    <option value="DEBUG">DEBUG</option>
                    <option value="INFO" selected>INFO</option>
                    <option value="WARNING">WARNING</option>
                    <option value="ERROR">ERROR</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="saveConfig()">Save Configuration</button>
        </div>

        <!-- Agents -->
        <div class="section">
            <h2>🤖 Agents</h2>
            <div id="agentsList"></div>
        </div>

        <!-- Memory -->
        <div class="section">
            <h2>🧠 Memories (mem0)</h2>
            <div class="memory-list" id="memoryList">
                <div style="color: var(--text-dim); font-size: 13px; padding: 12px;">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        async function init() {
            await loadConfig();
            await loadAgents();
            await loadMemories();
        }

        async function loadConfig() {
            try {
                const res = await fetch('/api/env');
                const data = await res.json();
                document.getElementById('openaiKey').value = data.openai_api_key || '';
                document.getElementById('anthropicKey').value = data.anthropic_api_key || '';
                document.getElementById('geminiKey').value = data.gemini_api_key || '';
                document.getElementById('moonshotKey').value = data.moonshot_api_key || '';
                document.getElementById('defaultAgent').value = data.default_agent || '';
                document.getElementById('mem0UserId').value = data.mem0_user_id || 'default_user';
                document.getElementById('logLevel').value = data.log_level || 'INFO';
            } catch (e) { showAlert('Failed to load config', 'error'); }
        }

        async function saveConfig() {
            try {
                const body = {
                    openai_api_key: document.getElementById('openaiKey').value,
                    anthropic_api_key: document.getElementById('anthropicKey').value,
                    gemini_api_key: document.getElementById('geminiKey').value,
                    moonshot_api_key: document.getElementById('moonshotKey').value,
                    default_agent: document.getElementById('defaultAgent').value,
                    mem0_user_id: document.getElementById('mem0UserId').value,
                    log_level: document.getElementById('logLevel').value,
                };
                const res = await fetch('/api/env', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                if (res.ok) showAlert('Configuration saved!', 'success');
                else showAlert('Failed to save', 'error');
            } catch (e) { showAlert('Error: ' + e.message, 'error'); }
        }

        async function loadAgents() {
            try {
                const res = await fetch('/api/agents');
                const data = await res.json();
                const list = document.getElementById('agentsList');
                list.innerHTML = '';
                (data.agents || []).forEach(a => {
                    list.innerHTML += `
                        <div class="agent-card">
                            <div class="agent-header">
                                <span class="agent-name">${escapeHtml(a.name)}</span>
                                <span class="agent-model">${escapeHtml(a.model)}</span>
                            </div>
                            <div class="agent-role">${escapeHtml(a.role)} — ${escapeHtml(a.goal)}</div>
                        </div>`;
                });
                if (!data.agents?.length) {
                    list.innerHTML = '<div style="color: var(--text-dim); font-size: 13px; padding: 8px;">No agents configured.</div>';
                }
            } catch (e) { console.error(e); }
        }

        async function loadMemories() {
            try {
                const res = await fetch('/api/memory');
                const data = await res.json();
                const list = document.getElementById('memoryList');
                const memories = data.memories || [];
                if (!memories.length) {
                    list.innerHTML = '<div style="color: var(--text-dim); font-size: 13px; padding: 12px;">No memories yet. Start chatting to build your knowledge base!</div>';
                    return;
                }
                list.innerHTML = '';
                memories.forEach(m => {
                    const text = m.memory || m.text || JSON.stringify(m);
                    const mid = m.id || '';
                    list.innerHTML += `
                        <div class="memory-item">
                            <span>• ${escapeHtml(text)}</span>
                            <button class="delete-btn" onclick="deleteMemory('${mid}')" title="Delete">×</button>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }

        async function deleteMemory(id) {
            if (!confirm('Delete this memory?')) return;
            try {
                await fetch(`/api/memory/${id}`, { method: 'DELETE' });
                await loadMemories();
            } catch (e) { showAlert('Failed to delete', 'error'); }
        }

        function showAlert(msg, type) {
            const el = document.getElementById('statusAlert');
            el.textContent = msg;
            el.className = 'alert ' + type;
            setTimeout(() => { el.className = 'alert'; }, 3000);
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        init();
    </script>
</body>

</html>
