<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenVassal — Chat</title>
    <style>
        :root {
            --bg: #0f0f15;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --surface: #1e1e32;
            --border: #2d2d4a;
            --text: #e8e8f0;
            --text-dim: #8888aa;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.15);
            --green: #00e676;
            --magenta: #e040fb;
            --orange: #ff9100;
            --red: #ff5252;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent), var(--magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .nav-links {
            margin-left: auto;
            display: flex;
            gap: 12px;
        }

        .header .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .header .nav-links a:hover {
            background: var(--surface);
            color: var(--text);
        }

        /* ── Controls Bar ─────────────────────────── */
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .controls label {
            font-size: 13px;
            color: var(--text-dim);
        }

        .agent-select {
            background: var(--bg-secondary);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
            min-width: 160px;
        }

        .agent-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .pipeline-btn {
            background: linear-gradient(135deg, var(--magenta), var(--orange));
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .pipeline-btn:hover {
            opacity: 0.85;
        }

        .agent-badge {
            font-size: 11px;
            color: var(--text-dim);
            background: var(--bg);
            padding: 3px 8px;
            border-radius: 10px;
        }

        /* ── Conversations Sidebar ────────────────── */
        .main-area {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header span {
            font-size: 14px;
            font-weight: 600;
        }

        .new-chat-btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .conv-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .conv-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: background 0.2s;
            font-size: 13px;
        }

        .conv-item:hover {
            background: var(--surface);
        }

        .conv-item.active {
            background: var(--accent-glow);
            border-left: 3px solid var(--accent);
        }

        .conv-item .conv-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-item .conv-meta {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* ── Chat Area ────────────────────────────── */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            border-radius: var(--radius);
            padding: 14px 18px;
            line-height: 1.6;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #1a3a5c, #1a2a4a);
            border: 1px solid #2a4a6c;
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .message .agent-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .message pre {
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
        }

        .message code {
            font-family: 'Fira Code', monospace;
        }

        /* Pipeline results */
        .pipeline-result {
            align-self: flex-start;
            max-width: 90%;
            background: var(--surface);
            border: 1px solid var(--magenta);
            border-radius: var(--radius);
            padding: 16px;
        }

        .pipeline-step {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .pipeline-step:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .pipeline-step-header {
            font-size: 12px;
            font-weight: 600;
            color: var(--magenta);
            margin-bottom: 6px;
        }

        /* ── Input Area ───────────────────────────── */
        .input-area {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-row textarea {
            flex: 1;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            height: 48px;
            transition: border-color 0.2s;
        }

        .input-row textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--accent), #0088cc);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 0 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .send-btn:hover {
            opacity: 0.85;
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── Pipeline Modal ───────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            width: 480px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h2 {
            font-size: 18px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--magenta), var(--orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal select,
        .modal textarea,
        .modal input {
            width: 100%;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 12px;
        }

        .modal .btn-row {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }

        .modal .btn-primary {
            background: var(--magenta);
            color: white;
        }

        .modal .btn-cancel {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        /* ── Scrollbar ────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* ── Loading ──────────────────────────────── */
        .loading {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .loading .dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .loading .dot:nth-child(2) {
            animation-delay: 0.16s;
        }

        .loading .dot:nth-child(3) {
            animation-delay: 0.32s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="header">
        <h1>⚡ OpenVassal</h1>
        <div class="nav-links">
            <a href="/">Settings</a>
            <a href="/chat" class="active">Chat</a>
        </div>
    </div>

    <div class="controls">
        <label>Agent:</label>
        <select id="agentSelect" class="agent-select"></select>
        <span id="agentModel" class="agent-badge"></span>
        <div style="margin-left: auto;"></div>
        <button class="pipeline-btn" onclick="openPipelineModal()">▶ Pipeline</button>
    </div>

    <div class="main-area">
        <div class="sidebar">
            <div class="sidebar-header">
                <span>Conversations</span>
                <button class="new-chat-btn" onclick="newChat()">+ New</button>
            </div>
            <div class="conv-list" id="convList"></div>
        </div>

        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="agent-label">System</div>
                    Select an agent above and start chatting. Use the <strong>Pipeline</strong> button for multi-step
                    workflows.
                </div>
            </div>
            <div class="input-area">
                <div class="input-row">
                    <textarea id="messageInput" placeholder="Type your message…"
                        onkeydown="handleKey(event)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Pipeline Modal -->
    <div class="modal-overlay" id="pipelineModal">
        <div class="modal">
            <h2>▶ Run Pipeline</h2>
            <label style="font-size: 13px; color: var(--text-dim);">Pipeline:</label>
            <select id="pipelineSelect"></select>
            <div id="pipelineSteps" style="font-size: 12px; color: var(--text-dim); margin-bottom: 12px;"></div>
            <label style="font-size: 13px; color: var(--text-dim);">Your Request:</label>
            <textarea id="pipelineInput" rows="3" placeholder="Describe what you want the pipeline to do…"></textarea>
            <div class="btn-row">
                <button class="btn btn-cancel" onclick="closePipelineModal()">Cancel</button>
                <button class="btn btn-primary" onclick="runPipeline()">Run Pipeline</button>
            </div>
        </div>
    </div>

    <script>
        let currentSessionId = null;
        let agents = [];
        let pipelines = [];

        // ── Init ──────────────────────────────────────
        async function init() {
            await loadAgents();
            await loadPipelines();
            await loadConversations();
        }

        async function loadAgents() {
            try {
                const res = await fetch('/api/agents');
                const data = await res.json();
                agents = data.agents || [];
                const sel = document.getElementById('agentSelect');
                sel.innerHTML = '';
                agents.forEach(a => {
                    const opt = document.createElement('option');
                    opt.value = a.name;
                    opt.textContent = `${a.name} (${a.role})`;
                    sel.appendChild(opt);
                });
                sel.addEventListener('change', updateAgentBadge);
                updateAgentBadge();
            } catch (e) { console.error('Failed to load agents:', e); }
        }

        function updateAgentBadge() {
            const name = document.getElementById('agentSelect').value;
            const agent = agents.find(a => a.name === name);
            document.getElementById('agentModel').textContent = agent ? agent.model : '';
        }

        async function loadPipelines() {
            try {
                const res = await fetch('/api/pipelines');
                const data = await res.json();
                pipelines = data.pipelines || [];
                const sel = document.getElementById('pipelineSelect');
                sel.innerHTML = '';
                pipelines.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.name;
                    opt.textContent = `${p.name} — ${p.description}`;
                    sel.appendChild(opt);
                });
                sel.addEventListener('change', updatePipelineSteps);
                updatePipelineSteps();
            } catch (e) { console.error('Failed to load pipelines:', e); }
        }

        function updatePipelineSteps() {
            const name = document.getElementById('pipelineSelect').value;
            const pipe = pipelines.find(p => p.name === name);
            const div = document.getElementById('pipelineSteps');
            if (pipe) {
                div.innerHTML = pipe.steps.map((s, i) => `Step ${i + 1}: <b>${s.agent}</b> — ${s.task}`).join('<br>');
            }
        }

        async function loadConversations() {
            try {
                const res = await fetch('/api/conversations');
                const data = await res.json();
                const list = document.getElementById('convList');
                list.innerHTML = '';
                (data.conversations || []).forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'conv-item' + (c.id === currentSessionId ? ' active' : '');
                    div.innerHTML = `<div class="conv-title">${escapeHtml(c.title)}</div>
                        <div class="conv-meta">${c.agent_name || 'general'}</div>`;
                    div.onclick = () => switchConversation(c.id);
                    list.appendChild(div);
                });
            } catch (e) { console.error(e); }
        }

        async function switchConversation(id) {
            currentSessionId = id;
            document.getElementById('messages').innerHTML = '';
            await loadConversations();
        }

        async function newChat() {
            currentSessionId = null;
            document.getElementById('messages').innerHTML =
                `<div class="message assistant">
                    <div class="agent-label">System</div>
                    New conversation started. Select an agent and type your message.
                </div>`;
            await loadConversations();
        }

        // ── Chat ──────────────────────────────────────
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const msg = input.value.trim();
            if (!msg) return;

            const agentName = document.getElementById('agentSelect').value;
            if (!agentName) {
                alert('Please select an agent first.');
                return;
            }

            input.value = '';
            appendMessage('user', msg, 'You');
            showLoading();

            try {
                const body = { message: msg, agent_name: agentName };
                if (currentSessionId) body.session_id = currentSessionId;

                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();
                hideLoading();
                appendMessage('assistant', data.response, data.agent);
                if (data.session_id) {
                    currentSessionId = data.session_id;
                    await loadConversations();
                }
            } catch (e) {
                hideLoading();
                appendMessage('assistant', '⚠️ Failed to send message: ' + e.message, 'System');
            }
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function appendMessage(role, content, agentLabel) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            if (role === 'assistant') {
                div.innerHTML = `<div class="agent-label">${escapeHtml(agentLabel || '')}</div>${formatContent(content)}`;
            } else {
                div.innerHTML = formatContent(content);
            }
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }

        function showLoading() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'loading';
            div.innerHTML = '<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }
        function hideLoading() { document.getElementById('loading')?.remove(); }

        // ── Pipeline ──────────────────────────────────
        function openPipelineModal() { document.getElementById('pipelineModal').classList.add('active'); }
        function closePipelineModal() { document.getElementById('pipelineModal').classList.remove('active'); }

        async function runPipeline() {
            const name = document.getElementById('pipelineSelect').value;
            const desc = document.getElementById('pipelineInput').value.trim();
            if (!desc) { alert('Please describe what the pipeline should do.'); return; }

            closePipelineModal();
            appendMessage('user', `▶ Pipeline: ${name}\n${desc}`, 'You');
            showLoading();

            try {
                const res = await fetch('/api/pipeline', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pipeline_name: name, description: desc }),
                });
                const data = await res.json();
                hideLoading();

                // Render pipeline results
                const div = document.createElement('div');
                div.className = 'pipeline-result';
                let html = '';
                (data.results || []).forEach(r => {
                    html += `<div class="pipeline-step">
                        <div class="pipeline-step-header">${escapeHtml(r.agent)} — ${escapeHtml(r.step)}</div>
                        ${formatContent(r.output)}
                    </div>`;
                });
                div.innerHTML = html;
                document.getElementById('messages').appendChild(div);
                div.scrollIntoView({ behavior: 'smooth' });
            } catch (e) {
                hideLoading();
                appendMessage('assistant', '⚠️ Pipeline failed: ' + e.message, 'System');
            }
        }

        // ── Helpers ───────────────────────────────────
        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function formatContent(text) {
            if (!text) return '';
            // Basic markdown: code blocks, bold, inline code
            return text
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }

        init();
    </script>
</body>

</html>
